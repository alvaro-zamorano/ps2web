name: Build PS2WEB (wasm)

on:
  push:
  workflow_dispatch:

jobs:
  # --- F1: build a licensed homebrew ELF fixture (ps2sdk 'cube', AFL v2.0) ---
  fixtures:
    runs-on: ubuntu-latest
    container: ps2dev/ps2dev:latest
    steps:
      - name: Checkout ps2web
        uses: actions/checkout@v4
      - name: Install make/git in image
        run: apk add --no-cache make git || true
      - name: Build fixtures (cube fatal, vu1 best-effort)
        run: |
          echo "PS2SDK=$PS2SDK"
          mkdir -p /tmp/fixtures
          ( cd tests/fixtures/src/cube && make && test -f cube.elf && cp cube.elf /tmp/fixtures/ )
          ( cd tests/fixtures/src/vu1  && make && test -f vu1.elf  && cp vu1.elf  /tmp/fixtures/ ) || echo "WARN: vu1 fixture build failed (non-fatal)"
          ls -la /tmp/fixtures
      - name: Upload fixtures
        uses: actions/upload-artifact@v4
        with:
          name: fixtures
          path: /tmp/fixtures

  # --- F0/F2: reproducible wasm build of Play! + PS2WEB frontend overlay ---
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout ps2web (overlay)
        uses: actions/checkout@v4
        with:
          path: ps2web
      - name: Read pinned upstream SHA
        id: pin
        run: echo "sha=$(cat ps2web/UPSTREAM.lock)" >> "$GITHUB_OUTPUT"
      - name: Checkout Play- at pinned SHA
        uses: actions/checkout@v4
        with:
          repository: jpd002/Play-
          ref: ${{ steps.pin.outputs.sha }}
          submodules: recursive
          fetch-depth: 0
          path: Play-
      - name: Fixture license check (LEG-02)
        run: bash ps2web/tools/check_fixture_licenses.sh
      - name: Apply PS2WEB frontend overlay (src)
        run: cp -rv ps2web/overlay/js/play_browser/src/. Play-/js/play_browser/src/
      - name: Apply PS2WEB frontend overlay (public shell)
        run: |
          if [ -d ps2web/overlay/js/play_browser/public ]; then
            cp -rv ps2web/overlay/js/play_browser/public/. Play-/js/play_browser/public/
          fi
      - name: Serve compatibility catalog as static assets (Sprint 1)
        run: |
          if [ -f ps2web/bench/compat.json ]; then
            cp -v ps2web/bench/compat.json Play-/js/play_browser/public/compat.json
          else
            echo "WARN: bench/compat.json missing — library search will be empty (app tolerates it)"
          fi
          if [ -f ps2web/bench/verified.json ]; then
            cp -v ps2web/bench/verified.json Play-/js/play_browser/public/verified.json
          else
            echo "WARN: bench/verified.json missing — no verified badges"
          fi

      - name: Apply F2 build flags (threads pool 8 + fixed 1GB memory)
        run: bash ps2web/tools/apply_f2_flags.sh Play-

      - name: Apply F3 patches (main + CodeGen submodule)
        run: |
          shopt -s nullglob
          for f in ps2web/patches/*.patch; do
            echo "apply (main): $f"; git -C Play- apply --index "$GITHUB_WORKSPACE/$f"
          done
          for f in ps2web/patches/codegen/*.patch; do
            echo "apply (codegen): $f"; git -C Play-/deps/CodeGen apply --index "$GITHUB_WORKSPACE/$f"
          done
          echo "patches applied (or none)."
      - name: Setup Node.js (emitter gate)
        uses: actions/setup-node@v4
        with:
          node-version: 20.17
      - name: JIT-04 emitter gate (fast — validates emitted wasm before the 25-min build)
        run: bash ps2web/tools/wasm-emitter-check/run.sh "$GITHUB_WORKSPACE/Play-/deps/CodeGen"
      - name: Setup Emscripten (pinned)
        uses: emscripten-core/setup-emsdk@v16
        with:
          version: 4.0.1
      - name: Install ninja
        run: sudo apt-get update && sudo apt-get install -y ninja-build
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.17
      - name: Configure (emcmake, preset wasm-ninja + -msimd128)
        working-directory: Play-
        run: emcmake cmake --preset wasm-ninja -DCMAKE_CXX_FLAGS="-msimd128" -DCMAKE_C_FLAGS="-msimd128"
      - name: Build (preset wasm-ninja-release)
        working-directory: Play-
        run: cmake --build --preset wasm-ninja-release
      - name: Verify Play.wasm artifact exists
        working-directory: Play-
        run: |
          BUILD_DIR=build_cmake/build/wasm-ninja/Source/ui_js/Release
          ls -la "$BUILD_DIR"
          test -f "$BUILD_DIR/Play.wasm"
      - name: Assemble Play Browser site
        working-directory: Play-
        run: |
          BUILD_DIR="$GITHUB_WORKSPACE/Play-/build_cmake/build/wasm-ninja/Source/ui_js/Release"
          cd js/play_browser
          cp "$BUILD_DIR/Play.js"   ./src/
          cp "$BUILD_DIR/Play.wasm" ./public/
          cp "$BUILD_DIR/Play.js"   ./public/
          export REACT_APP_VERSION="$(git -C "$GITHUB_WORKSPACE/Play-" describe --tags --always 2>/dev/null || echo dev)"
          npm install
          npm run build
      - name: Stage dist for ps2web
        run: |
          mkdir -p ps2web/dist
          cp -r Play-/js/play_browser/build/. ps2web/dist/
          cp "Play-/build_cmake/build/wasm-ninja/Source/ui_js/Release/Play.wasm" ps2web/dist/Play.wasm
          ls -la ps2web/dist | head
      - name: Upload Play.wasm
        uses: actions/upload-artifact@v4
        with:
          name: play-wasm
          path: Play-/build_cmake/build/wasm-ninja/Source/ui_js/Release/Play.wasm
      - name: Upload site
        uses: actions/upload-artifact@v4
        with:
          name: ps2web-site
          path: ps2web/dist

  # --- F0 smoke: decoupled from build so a flaky smoke never skips the harness ---
  smoke:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout ps2web
        uses: actions/checkout@v4
      - name: Download site
        uses: actions/download-artifact@v4
        with:
          name: ps2web-site
          path: dist
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.17
      - name: Install + Playwright
        run: |
          npm install
          npx playwright install --with-deps chromium
      - name: F0 smoke (COOP/COEP + valid wasm)
        run: npm run smoke
      - name: Upload smoke screenshot
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: f0-smoke-screenshot
          path: test-results
          if-no-files-found: ignore

  # --- F1 W3/W4: run the metrics harness on the built site + fixture ---
  harness:
    needs: [build, fixtures]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout ps2web
        uses: actions/checkout@v4
      - name: Download site
        uses: actions/download-artifact@v4
        with:
          name: ps2web-site
          path: dist
      - name: Download fixtures
        uses: actions/download-artifact@v4
        with:
          name: fixtures
          path: dist/fixtures
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.17
      - name: Install + Playwright
        run: |
          npm install
          npx playwright install --with-deps chromium
      - name: Run metrics harness (cube)
        env:
          BENCH_FIXTURE: cube
          BENCH_SECONDS: "20"
          BENCH_WARMUP: "6"
        run: npx playwright test -c tests/harness/playwright.harness.config.js
      - name: Run metrics harness (vu1, CPU/VU-bound, best-effort)
        if: hashFiles('dist/fixtures/vu1.elf') != ''
        continue-on-error: true
        env:
          BENCH_FIXTURE: vu1
          BENCH_SECONDS: "20"
          BENCH_WARMUP: "6"
        run: npx playwright test -c tests/harness/playwright.harness.config.js

      # --- JIT-04 BISECT: one build, three hypotheses. The batcher died the instant it first
      # flushed. Mode 1 (batch + re-point, solo modules KEPT alive) vs mode 2 (also release)
      # tells us whether the re-emitted bodies are wrong or the release path is. Both are
      # non-fatal: we want the DATA, not a red build.
      - name: JIT-04 bisect — cube mode 1 (re-point, NO release)
        continue-on-error: true
        env:
          BENCH_FIXTURE: cube
          BENCH_SECONDS: "20"
          BENCH_WARMUP: "6"
          BENCH_BATCH_MODE: "1"
        run: npx playwright test -c tests/harness/playwright.harness.config.js
      - name: JIT-04 bisect — cube mode 2 (re-point + release)
        continue-on-error: true
        env:
          BENCH_FIXTURE: cube
          BENCH_SECONDS: "20"
          BENCH_WARMUP: "6"
          BENCH_BATCH_MODE: "2"
        run: npx playwright test -c tests/harness/playwright.harness.config.js
      # Mode 3 separates "building + registering the batch module" from "executing a batched
      # body": the module is created and its 32 functions ARE added to the indirect table, but no
      # block is re-pointed. Healthy => creation is harmless, the bodies are at fault.
      # Dead => creating/registering the module is what breaks, not the bodies.
      - name: JIT-04 bisect — cube mode 3 (build batch, do NOT re-point)
        continue-on-error: true
        env:
          BENCH_FIXTURE: cube
          BENCH_SECONDS: "20"
          BENCH_WARMUP: "6"
          BENCH_BATCH_MODE: "3"
        run: npx playwright test -c tests/harness/playwright.harness.config.js
      - name: OPFS persistence E2E (F5 W1)
        run: npx playwright test -c tests/e2e/playwright.e2e.config.js
      - name: Upload bench results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bench-results
          path: bench/results
          if-no-files-found: warn

  # --- F8: deploy prebuilt dist to Vercel with COOP/COEP (needs VERCEL_TOKEN secret) ---
  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout ps2web
        uses: actions/checkout@v4
      - name: Download site
        uses: actions/download-artifact@v4
        with:
          name: ps2web-site
          path: dist
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.17
      - name: Deploy to Vercel (prebuilt static + COOP/COEP)
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          if [ -z "$VERCEL_TOKEN" ]; then echo "VERCEL_TOKEN not set — skipping deploy (add it in repo Settings > Secrets)"; exit 0; fi
          cp deploy/vercel.json dist/vercel.json
          npx --yes vercel@latest deploy dist --prod --yes --token="$VERCEL_TOKEN" | tee /tmp/vercel_url.txt
          echo "Deployed: $(tail -1 /tmp/vercel_url.txt)"
